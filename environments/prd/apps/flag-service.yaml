apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flag-service
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/AXMEDUSA/ToggleMaster-gitops.git
    targetRevision: main
    path: environments/prd/flag-service 

  destination:
    server: https://kubernetes.default.svc
    namespace: flag-service   

  syncPolicy:
    automated:
      prune: true
      selfHeal: true