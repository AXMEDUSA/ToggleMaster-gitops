apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datadog
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/AXMEDUSA/ToggleMaster-gitops.git
    targetRevision: main
    path: environments/prd/datadog

  destination:
    server: https://kubernetes.default.svc
    namespace: datadog

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
