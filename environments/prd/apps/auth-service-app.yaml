apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/AXMEDUSA/ToggleMaster-gitops.git
    targetRevision: main
    path: environments/prd/auth-service 

  destination:
    server: https://kubernetes.default.svc
    namespace: auth-service   

  syncPolicy:
    automated:
      prune: true
      selfHeal: true