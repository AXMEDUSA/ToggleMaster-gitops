apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 8.0.0
    chart: grafana
    helm:
      releaseName: grafana
      values: |
        fullnameOverride: grafana

        replicas: 1

        deploymentStrategy:
          type: Recreate

        persistence:
          enabled: true
          size: 5Gi
          accessModes:
            - ReadWriteOnce

        adminUser: admin
        adminPassword: ""
        admin:
          existingSecret: grafana-admin-secret
          userKey: admin-user
          passwordKey: admin-password

        grafana.ini:
          server:
            root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
            serve_from_sub_path: false
          analytics:
            check_for_updates: false
          log:
            mode: console
            level: info
          auth.anonymous:
            enabled: false
          dashboards:
            default_home_dashboard_path: /var/lib/grafana/dashboards/togglemaster-ecosystem.json

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                uid: prometheus
                url: http://prometheus-server.observability.svc.cluster.local:80
                access: proxy
                isDefault: true
                jsonData:
                  timeInterval: 15s
                  queryTimeout: 60s
              - name: Loki
                type: loki
                uid: loki
                url: http://loki.observability.svc.cluster.local:3100
                access: proxy
                jsonData:
                  maxLines: 1000
                  timeout: 60

        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: default
                orgId: 1
                folder: ToggleMaster
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards

        dashboardsConfigMaps:
          default: togglemaster-ecosystem-dashboard

        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            searchNamespace: observability
          datasources:
            enabled: true
            label: grafana_datasource
            labelValue: "1"

        service:
          type: ClusterIP
          port: 80

        ingress:
          enabled: true
          annotations:
            kubernetes.io/ingress.class: nginx
          hosts:
            - grafana.togglemaster.internal
          path: /grafana

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          timeoutSeconds: 30

        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
