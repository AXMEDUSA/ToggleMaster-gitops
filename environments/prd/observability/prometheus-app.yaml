apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 29.3.0
    chart: prometheus
    helm:
      releaseName: prometheus
      values: |
        server:
          fullnameOverride: prometheus-server
          retention: "15d"
          persistentVolume:
            enabled: true
            size: 10Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - host: prometheus.togglemaster.internal
                paths:
                  - path: /
                    pathType: Prefix

        alertmanager:
          enabled: true
          persistence:
            size: 2Gi
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - host: alertmanager.togglemaster.internal
                paths:
                  - path: /
                    pathType: Prefix

        nodeExporter:
          enabled: true

        kubeStateMetrics:
          enabled: true

        extraScrapeConfigs: |
          - job_name: togglemaster-services
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names:
                    - flag-service-prd
                    - auth-service-prd
                    - evaluation-service-prd
                    - analytics-service-prd
                    - targeting-service-prd
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: "true"
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                action: replace
                regex: ([^:]+)(?::\d+)?;(\d+)
                replacement: $1:$2
                target_label: __address__
              - action: labelmap
                regex: __meta_kubernetes_pod_label_(.+)
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: kubernetes_namespace
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: kubernetes_pod_name

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
