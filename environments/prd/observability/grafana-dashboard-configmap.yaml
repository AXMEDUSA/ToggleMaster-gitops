apiVersion: v1
kind: ConfigMap
metadata:
  name: togglemaster-ecosystem-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  togglemaster-ecosystem.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Dashboard centralizado de saúde do ecossistema ToggleMaster: recursos do cluster, requisições dos microsserviços e logs em tempo real",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Recursos do Cluster",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "CPU do Cluster (%)",
          "type": "gauge",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU %",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "Memória do Cluster (%)",
          "type": "gauge",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 * (1 - ((node_memory_MemFree_bytes + node_memory_Cached_bytes + node_memory_Buffers_bytes) / node_memory_MemTotal_bytes))",
              "legendFormat": "Memória %",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "Disco do Cluster (%)",
          "type": "gauge",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!~\"tmpfs|fuse.lxcfs\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!~\"tmpfs|fuse.lxcfs\"} * 100)",
              "legendFormat": "Disco %",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red", "index": 0, "text": "Down" }, "1": { "color": "green", "index": 1, "text": "Up" } }, "type": "value" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 6, "w": 4, "x": 12, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Nodes Ativos",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "Nodes Ready",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 6, "w": 4, "x": 16, "y": 1 },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Pods Reiniciando",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(kube_pod_container_status_restarts_total[1h]))",
              "legendFormat": "Restarts/1h",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "axisPlacement": "auto",
                "fillOpacity": 20,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 7 },
          "id": 10,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "title": "CPU por Node — Histórico",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 - (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]) * 100)",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "axisPlacement": "auto",
                "fillOpacity": 20,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "bytes"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 7 },
          "id": 11,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "title": "Memória por Node — Histórico",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "node_memory_MemTotal_bytes - node_memory_MemFree_bytes - node_memory_Cached_bytes - node_memory_Buffers_bytes",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 15 },
          "id": 200,
          "title": "Microsserviços ToggleMaster — Recursos e Saúde",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "CPU cores",
                "axisPlacement": "auto",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "id": 20,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "title": "CPU por Microsserviço (millicores)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"flag-service-prd|auth-service-prd|evaluation-service-prd|analytics-service-prd|targeting-service-prd\",container!=\"\",container!=\"POD\"}[5m])) by (namespace) * 1000",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "memória",
                "axisPlacement": "auto",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "bytes"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "id": 21,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "title": "Memória por Microsserviço",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(container_memory_working_set_bytes{namespace=~\"flag-service-prd|auth-service-prd|evaluation-service-prd|analytics-service-prd|targeting-service-prd\",container!=\"\",container!=\"POD\"}) by (namespace)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 24 },
          "id": 22,
          "options": {
            "displayMode": "lcd",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showUnfilled": true
          },
          "title": "Pods Disponíveis por Serviço",
          "type": "bargauge",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(kube_deployment_status_replicas_available{namespace=~\"flag-service-prd|auth-service-prd|evaluation-service-prd|analytics-service-prd|targeting-service-prd\"}) by (namespace)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 24 },
          "id": 23,
          "options": {
            "displayMode": "lcd",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showUnfilled": true
          },
          "title": "Restarts por Pod (última 1h)",
          "type": "bargauge",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"flag-service-prd|auth-service-prd|evaluation-service-prd|analytics-service-prd|targeting-service-prd\"}[1h])) by (namespace)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 30 },
          "id": 300,
          "title": "Logs em Tempo Real",
          "type": "row"
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 31 },
          "id": 30,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "title": "Logs — Todos os Microsserviços (tempo real)",
          "type": "logs",
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{namespace=~\"flag-service-prd|auth-service-prd|evaluation-service-prd|analytics-service-prd|targeting-service-prd\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 41 },
          "id": 31,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "title": "Logs de Erro — Filtrado por ERROR/WARN",
          "type": "logs",
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{namespace=~\"flag-service-prd|auth-service-prd|evaluation-service-prd|analytics-service-prd|targeting-service-prd\"} |~ \"(?i)(error|warn|exception|fatal)\"",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never"
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 41 },
          "id": 32,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "title": "Volume de Logs por Serviço",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum(count_over_time({namespace=~\"flag-service-prd|auth-service-prd|evaluation-service-prd|analytics-service-prd|targeting-service-prd\"}[1m])) by (namespace)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["togglemaster", "kubernetes", "observabilidade"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "America/Sao_Paulo",
      "title": "ToggleMaster — Saúde do Ecossistema",
      "uid": "togglemaster-ecosystem",
      "version": 1
    }
