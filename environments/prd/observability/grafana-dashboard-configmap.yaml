apiVersion: v1
kind: ConfigMap
metadata:
  name: togglemaster-ecosystem-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  togglemaster-ecosystem.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "ToggleMaster — Pipeline CI/CD, OTel Collector, Microsserviços, Cluster e Logs",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 500,
          "title": "🚀 CI/CD Pipeline — Deploy & Imagens",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              },
              "mappings": []
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 501,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "text": {}
          },
          "title": "Pods em ImagePullBackOff",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(kube_pod_container_status_waiting_reason{reason=\"ImagePullBackOff\", namespace=~\"auth-service-prd|flag-service-prd|targeting-service-prd|evaluation-service-prd|analytics-service-prd\"}) or vector(0)",
              "legendFormat": "ImagePullBackOff",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 502,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Pods em CrashLoopBackOff",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(kube_pod_container_status_waiting_reason{reason=\"CrashLoopBackOff\", namespace=~\"auth-service-prd|flag-service-prd|targeting-service-prd|evaluation-service-prd|analytics-service-prd\"}) or vector(0)",
              "legendFormat": "CrashLoopBackOff",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 5 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 503,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Pods Running (Total TM)",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(kube_pod_status_phase{phase=\"Running\", namespace=~\"auth-service-prd|flag-service-prd|targeting-service-prd|evaluation-service-prd|analytics-service-prd\"})",
              "legendFormat": "Running",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "id": 504,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Pods Pending",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(kube_pod_status_phase{phase=\"Pending\", namespace=~\"auth-service-prd|flag-service-prd|targeting-service-prd|evaluation-service-prd|analytics-service-prd\"}) or vector(0)",
              "legendFormat": "Pending",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "id": 505,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Restarts (última 30min)",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"auth-service-prd|flag-service-prd|targeting-service-prd|evaluation-service-prd|analytics-service-prd\"}[30m]))",
              "legendFormat": "Restarts",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2, "showPoints": "never", "spanNulls": true }
            }
          },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 5 },
          "id": 506,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "title": "Replicas Disponíveis vs Desejadas por Deployment",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "kube_deployment_status_replicas_available{namespace=~\"auth-service-prd|flag-service-prd|targeting-service-prd|evaluation-service-prd|analytics-service-prd\"}",
              "legendFormat": "available · {{namespace}}",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "kube_deployment_spec_replicas{namespace=~\"auth-service-prd|flag-service-prd|targeting-service-prd|evaluation-service-prd|analytics-service-prd\"}",
              "legendFormat": "desired · {{namespace}}",
              "refId": "B"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2, "showPoints": "never", "spanNulls": true }
            }
          },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 5 },
          "id": 507,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "title": "Restarts por Pod — Histórico",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=~\"auth-service-prd|flag-service-prd|targeting-service-prd|evaluation-service-prd|analytics-service-prd\"}[5m])",
              "legendFormat": "{{namespace}} / {{pod}}",
              "refId": "A"
            }
          ]
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 12 },
          "id": 600,
          "title": "🔭 OpenTelemetry Collector — Saúde e Throughput",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red", "index": 0, "text": "DOWN" }, "1": { "color": "green", "index": 1, "text": "UP" } }, "type": "value" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 13 },
          "id": 601,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "OTel Collector — Status",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "up{job=\"otel-collector\"}",
              "legendFormat": "Collector",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 100 },
                  { "color": "red", "value": 500 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 13 },
          "id": 602,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Spans Recebidos/s",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(otelcol_receiver_accepted_spans_total[1m])",
              "legendFormat": "spans/s",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1000 },
                  { "color": "red", "value": 5000 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 13 },
          "id": 603,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Métricas Recebidas/s",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(otelcol_receiver_accepted_metric_points_total[1m])",
              "legendFormat": "metrics/s",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 500 },
                  { "color": "red", "value": 2000 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 13 },
          "id": 604,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Logs Recebidos/s",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(otelcol_receiver_accepted_logs_total[1m])",
              "legendFormat": "logs/s",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 13 },
          "id": 605,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Spans Recusados/s (erros export)",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(otelcol_receiver_refused_spans_total[1m]) + rate(otelcol_exporter_send_failed_spans_total[1m])",
              "legendFormat": "refused+failed/s",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 15, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "unit": "short"
            }
          },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 17 },
          "id": 610,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "title": "OTel — Throughput de Spans, Métricas e Logs",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(otelcol_receiver_accepted_spans_total[1m])",
              "legendFormat": "spans/s",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(otelcol_receiver_accepted_metric_points_total[1m])",
              "legendFormat": "metrics/s",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(otelcol_receiver_accepted_logs_total[1m])",
              "legendFormat": "logs/s",
              "refId": "C"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 15, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "unit": "bytes"
            }
          },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 17 },
          "id": 611,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "title": "OTel Collector — Uso de Memória e CPU",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "container_memory_working_set_bytes{namespace=\"observability\", pod=~\"otel-collector.*\", container=\"otel-collector\"}",
              "legendFormat": "Memória (bytes)",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"observability\", pod=~\"otel-collector.*\", container=\"otel-collector\"}[5m]) * 1000",
              "legendFormat": "CPU (millicores)",
              "refId": "B"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 31 },
          "id": 700,
          "title": "⚡ Microsserviços — HTTP e Latência (via OTel)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "id": 701,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "title": "Requisições HTTP por Serviço (req/s)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_server_request_duration_seconds_count[1m])) by (job)",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "unit": "ms"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "id": 702,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "title": "Latência HTTP p99 / p50 por Serviço (ms)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket[1m])) by (job, le))",
              "legendFormat": "p99 · {{job}}",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum(rate(http_server_request_duration_seconds_bucket[1m])) by (job, le))",
              "legendFormat": "p50 · {{job}}",
              "refId": "B"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 40 },
          "id": 703,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "title": "Taxa de Erros HTTP 4xx/5xx por Serviço",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~\"4..|5..\"}[1m])) by (job) / sum(rate(http_server_request_duration_seconds_count[1m])) by (job)",
              "legendFormat": "error rate · {{job}}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 48 },
          "id": 100,
          "title": "🖥️ Cluster AKS — Recursos",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 4, "x": 0, "y": 49 },
          "id": 1,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "CPU do Cluster (%)",
          "type": "gauge",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU %",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 4, "x": 4, "y": 49 },
          "id": 2,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "Memória do Cluster (%)",
          "type": "gauge",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 * (1 - ((node_memory_MemFree_bytes + node_memory_Cached_bytes + node_memory_Buffers_bytes) / node_memory_MemTotal_bytes))",
              "legendFormat": "Memória %",
              "refId": "A"
            }
