apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: evaluation-service-prd
spec:
  replicas: 3
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: evaluation-service
          image: toggleacr.azurecr.io/evaluation-service:latest
          ports:
            - containerPort: 8004
          # Variáveis públicas (URLs, portas etc.)
          envFrom:
            - configMapRef:
                name: evaluation-config
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: evaluation-secrets
                  key: REDIS_URL
            - name: SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: evaluation-secrets
                  key: SERVICE_API_KEY