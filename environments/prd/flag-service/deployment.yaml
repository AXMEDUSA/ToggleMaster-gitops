apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-service
  namespace: flag-service-prd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flag-service
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
      labels:
        app: flag-service
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: flag-service
          image: toggleacrfase4.azurecr.io/flag-service:fb3d99b
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: flag-config
            - secretRef:
                name: flag-secrets