apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-service
  namespace: flag-service-prd
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flag-service
  template:
    metadata:
      labels:
        app: flag-service
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: flag-service
          image: toggleacr.azurecr.io/flag-service:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: flag-config
            - secretRef:
                name: flag-secrets