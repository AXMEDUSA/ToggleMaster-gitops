apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: evaluation-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AXMEDUSA/ToggleMaster-gitops
    targetRevision: main
    path: environments/prd/evaluation-service
  destination:
    server: https://kubernetes.default.svc
    namespace: evaluation
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true